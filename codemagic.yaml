workflows:
  android-native-workflow:
    name: Android Native CMMS Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      vars:
        PACKAGE_NAME: "com.example"
      java: 17
    triggering:
      events:
        - push
    scripts:
      - name: Set up local.properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
      - name: Locate and Build APK
        script: |
          # البحث عن ملف gradlew في أي مكان داخل المستودع ومنحه الصلاحية
          GRADLEW_PATH=$(find . -name "gradlew" | head -n 1)
          if [ -z "$GRADLEW_PATH" ]; then
            echo "الملف غير موجود في الجذر، سيتم البناء عبر أداة النظام مباشرة"
            gradle assembleRelease
          else
            echo "تم العثور على ملف البناء في المسار: $GRADLEW_PATH"
            GRADLEW_DIR=$(dirname "$GRADLEW_PATH")
            cd "$GRADLEW_DIR"
            chmod +x gradlew
            ./gradlew assembleRelease
          fi
    artifacts:
      - "**/build/outputs/apk/**/*.apk"
    publishing:
      email:
        recipients:
          - ibr2hashim@gmail.com
        notify:
          success: true
          failure: true
