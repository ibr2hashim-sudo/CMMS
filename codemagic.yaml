workflows:
  android-native-workflow:
    name: Android Native CMMS Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      vars:
        PACKAGE_NAME: "com.example"
      java: 17
    triggering:
      events:
        - push
    scripts:
      - name: Set up local.properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
      - name: Fix permissions and Build APK
        script: |
          chmod +x app/gradlew || chmod +x gradlew || true
          ./gradlew assembleRelease --gradle-version 9.3.1
    artifacts:
      - app/build/outputs/apk/**/*.apk
    publishing:
      email:
        recipients:
          - ibr2hashim@gmail.com
        notify:
          success: true
          failure: true
